<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>Резюме — Михаил Ларин</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.5s ease; 
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            border: 1px solid #ddd; 
            text-align: center;
            max-width: 400px;
            transition: transform 0.3s ease;
        }

            .card:hover {
                transform: translateY(-10px);
                border-color: #007bff;
            }

        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #007bff;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            color: #222;
        }
        /* Размеры шрифта и цвет [cite: 355, 357] */
        p {
            color: #666;
            line-height: 1.6;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

            button:hover {
                background: #0056b3;
            }
    </style>
</head>
<body>
    <div class="card">
        <img src="my-photo.jpg" alt="Михаил Ларин">
        <h1>Михаил <span id="surname">Ларин</span></h1>
        <p>
            Инженер по промышленной автоматизации (3 курс).<br>
            Стек: C#, .NET, ПЛК, SQL. Увлекаюсь MTB и бас-гитарой.
        </p>

        <div class="controls">
            <label><input type="checkbox" id="relocation" class="skill-check"> Готов к переездам</label>
            <input type="text" id="hobby-input" placeholder="Твое хобби (например, кулинария)">
            <button id="submit-btn" class="btn" style="background-color: #ffc107; color: black;" onclick="hireMe()">Меня возьмут!</button>
            <input type="text" id="newSurname" placeholder="Новая фамилия...">
            <button onclick="changeSurname()">Сменить фамилию</button>
            <button style="background: #28a745;" onclick="randomBg()">Случайный фон</button>
        </div>
    </div>

    <script>
        function validateAge() {
        let isConfirmed = false;
        while (!isConfirmed) {
        let input = prompt("Введите ваш возраст:", "35");

        if (input === null) return;

        let ageValue = parseInt(input);

        if (isNaN(ageValue) || ageValue < 0) {
        alert("Ошибка! Имя — только текст, возраст — неотрицательные целые числа.");
        continue;
        }

        isConfirmed = confirm("Вы уверены, что вам " + ageValue + "?");
        }
        }

        validateAge();

        function hireMe() {
        const allInputs = document.querySelectorAll('input');
        const submitBtn = document.getElementById('submit-btn');

        allInputs.forEach(input => {
        input.disabled = true;
        });

        submitBtn.style.display = 'none';

        alert("Анкета принята! Все поля заблокированы.");
        }

        function changeSurname() {
        const input = document.getElementById('newSurname');
        const surnameSpan = document.getElementById('surname');
        if (input.value.trim() !== "") {
        surnameSpan.textContent = input.value;
        }
        }

        function randomBg() {
        const colors = ['#ff9a9e', '#fad0c4', '#a1c4fd', '#c2e9fb', '#d4fc79'];
        document.body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        }
    </script>
</body>
</html>
